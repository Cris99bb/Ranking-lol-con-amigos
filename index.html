<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ranking LoL</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px auto;
      border-radius: 10px;
      max-width: 500px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .rank {
      font-weight: bold;
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <h1>🔥 Ranking LoL en Vivo</h1>

  <div id="ranking">Cargando...</div>

  <script>
    const API_URL = "https://ranking-lol-con-amigos.onrender.com/ranking";

    async function loadRanking() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let html = "";

        data.forEach((p, i) => {
          html += `
            <div class="card">
              <h2>#${i + 1} ${p.name}</h2>
              <p class="rank">
                SoloQ: ${p.solo ? p.solo.rank + " - " + p.solo.lp + " LP" : "Unranked"}
              </p>
              <p>
                Flex: ${p.flex ? p.flex.rank + " - " + p.flex.lp + " LP" : "Unranked"}
              </p>
            </div>
          `;
        });

        document.getElementById("ranking").innerHTML = html;

      } catch (err) {
        document.getElementById("ranking").innerHTML = "❌ Error cargando ranking";
      }
    }

    loadRanking();

    // 🔥 auto refresh cada 30 segundos
    setInterval(loadRanking, 30000);
  </script>

</body>
</html>
