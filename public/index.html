<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ranking LoL Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 32px;
      color: #38bdf8;
      letter-spacing: 1px;
    }

    #ranking {
      max-width: 800px;
      margin: auto;
      padding: 10px;
    }

    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      border: 1px solid #1f2937;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      transition: 0.25s;
    }

    .card:hover {
      transform: scale(1.02);
      border-color: #38bdf8;
    }

    .left {
      display: flex;
      flex-direction: column;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .rank {
      font-size: 14px;
      color: #94a3b8;
    }

    .lp {
      font-size: 18px;
      font-weight: bold;
      color: #22c55e;
    }

    .position {
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
      width: 40px;
    }
  </style>
</head>

<body>

  <h1>🔥 Ranking LoL Pro</h1>

  <div id="ranking">Cargando...</div>

  <script>
    const API_URL = "https://ranking-lol-con-amigos.onrender.com/ranking";

    async function loadRanking() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let html = "";

        data.forEach((p, i) => {
          html += `
            <div class="card">
              <div class="position">#${i + 1}</div>

              <div class="left">
                <div class="name">${p.name}</div>
                <div class="rank">
                  SoloQ: ${p.solo ? p.solo.rank : "Unranked"} | 
                  Flex: ${p.flex ? p.flex.rank : "Unranked"}
                </div>
              </div>

              <div class="lp">
                ${p.solo ? p.solo.lp + " LP" : ""}
              </div>
            </div>
          `;
        });

        document.getElementById("ranking").innerHTML = html;

      } catch (err) {
        document.getElementById("ranking").innerHTML = "Error cargando datos";
      }
    }

    loadRanking();
    setInterval(loadRanking, 30000);
  </script>

</body>
</html>
