<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LoL Ranking Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0a0f1c;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
  color:#38bdf8;
}

/* TOP 1 */
.top1{
  width:85%;
  margin:15px auto;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(90deg,#facc15,#f59e0b);
  color:black;
  font-weight:bold;
  animation:fade 0.6s ease;
}

/* CARD */
.card{
  width:85%;
  margin:10px auto;
  padding:14px;
  border-radius:14px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transform:translateY(15px);
  opacity:0;
  animation:up 0.4s forwards;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
  border:1px solid #38bdf8;
}

.left{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.name{
  font-weight:bold;
  font-size:17px;
}

.rank{
  font-size:13px;
  color:#94a3b8;
}

.lp{
  font-size:18px;
  font-weight:bold;
  color:#22c55e;
}

/* BAR */
.bar{
  width:140px;
  height:6px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#22c55e;
}

/* BADGE */
.badge{
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:bold;
}

/* ELO COLORS */
.IRON{background:#444;}
.BRONZE{background:#b45309;}
.SILVER{background:#94a3b8;}
.GOLD{background:#facc15;color:black;}
.PLATINUM{background:#14b8a6;}
.EMERALD{background:#10b981;}
.DIAMOND{background:#3b82f6;}
.MASTER{background:#a855f7;}
.GRANDMASTER{background:#ef4444;}
.CHALLENGER{background:#f97316;}

@keyframes up{
to{opacity:1;transform:translateY(0);}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<h1>🔥 Ranking LoL Pro</h1>

<div id="top1"></div>
<div id="list"></div>

<script>

const API = "https://ranking-lol-con-amigos.onrender.com/ranking";

function tier(p){
  if(!p?.solo?.rank) return "IRON";
  return p.solo.rank.split(" ")[0].toUpperCase();
}

function wr(w,l){
  if(!w || !l) return 0;
  return Math.round((w/(w+l))*100);
}

function icon(t){
  switch(t){
    case "IRON": return "⛓️";
    case "BRONZE": return "🟤";
    case "SILVER": return "⚪";
    case "GOLD": return "🟡";
    case "PLATINUM": return "🔷";
    case "EMERALD": return "💚";
    case "DIAMOND": return "💎";
    case "MASTER": return "🟣";
    case "GRANDMASTER": return "🔴";
    case "CHALLENGER": return "👑";
    default: return "❓";
  }
}

let lastTop = "";

async function load(){
  const res = await fetch(API);
  const data = await res.json();

  if(!data.length) return;

  const top = data[0];

  if(lastTop !== top.name){
    lastTop = top.name;
    console.log("Nuevo #1");
  }

  document.getElementById("top1").innerHTML = `
    <div class="top1">
      🥇 TOP 1: ${top.name}
      | ${top.solo?.rank || "Unranked"}
      | ${top.solo?.lp || 0} LP
      | WR ${wr(top.solo?.wins, top.solo?.losses)}%
    </div>
  `;

  let html = "";

  data.forEach((p,i)=>{
    const t = tier(p);
    const w = p.solo?.wins || 0;
    const l = p.solo?.losses || 0;
    const winrate = wr(w,l);

    html += `
      <div class="card">
        <div class="left">
          <div class="name">#${i+1} ${p.name}</div>

          <div class="rank">
            ${p.solo?.rank || "Unranked"} | W:${w} L:${l} | WR:${winrate}%
          </div>

          <div class="bar">
            <div class="fill" style="width:${winrate}%"></div>
          </div>
        </div>

        <div class="lp">${p.solo?.lp || 0} LP</div>

        <div class="badge ${t}">
          ${icon(t)} ${t}
        </div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

load();
setInterval(load, 12000);

</script>

</body>
</html>
